<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admissions</title>
    <link rel="stylesheet" th:href="@{/css/admin-layout.css}">
    <link rel="stylesheet" th:href="@{/css/demandes.css}">
</head>
<body>

<div th:replace="~{fragments/sidebar-responsable :: sidebar}"></div>

<div class="contenu-principal">
    <div class="en-tete-page">
        <h1>Admissions</h1>
        <span class="utilisateur-connecte">Responsable</span>
    </div>

    <table class="tableau-demandes">
        <thead>
            <tr>
                <th>Nom</th>
                <th>Ecole</th>
                <th>Filiere</th>
                <th>Niveau</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="demande : ${demandesAcceptees}">
                <td th:text="${demande.prenom + ' ' + demande.nom}">-</td>
                <td th:text="${demande.ecole}">-</td>
                <td th:text="${demande.filiere}">-</td>
                <td th:text="${demande.niveau}">-</td>
                <td>
                    <a th:href="@{/responsable/admissions/fiche/{id}(id=${demande.id})}"
                       class="btn-accepter">Creer fiche stagiaire</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(demandesAcceptees)}">
                <td colspan="5" style="text-align:center; color:#777; padding:30px;">
                    Aucune demande acceptee pour le moment.
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
