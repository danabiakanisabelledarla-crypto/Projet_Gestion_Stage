<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Affectations - Responsable</title>
    <link rel="stylesheet" th:href="@{/css/admin-layout.css}">
    <link rel="stylesheet" th:href="@{/css/demandes.css}">
</head>
<body>

<div th:replace="~{fragments/sidebar-responsable :: sidebar}"></div>

<div class="contenu-principal">
    <div class="en-tete-page">
        <h1>Affectations</h1>
        <span class="utilisateur-connecte">Responsable</span>
    </div>

    <table class="tableau-demandes">
        <thead>
            <tr>
                <th>Matricule</th>
                <th>Stagiaire</th>
                <th>Encadreur</th>
                <th>Service</th>
                <th>Debut</th>
                <th>Fin</th>
                <th>Statut</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="stage : ${stages}">
                <td th:text="${stage.numeroStage}">-</td>
                <td th:text="${stage.stagiaire.utilisateur.prenom
                             + ' ' + stage.stagiaire.utilisateur.nom}">-</td>
                <td th:text="${stage.encadreur.utilisateur.prenom
                             + ' ' + stage.encadreur.utilisateur.nom}">-</td>
                <td th:text="${stage.service.nom}">-</td>
                <td th:text="${stage.dateDebut}">-</td>
                <td th:text="${stage.dateFin}">-</td>
                <td>
                    <span th:class="'badge ' + ${stage.statut.name()}"
                          th:text="${stage.statut}">-</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(stages)}">
                <td colspan="7" style="text-align:center; color:#777; padding:30px;">
                    Aucune affectation pour le moment.
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
