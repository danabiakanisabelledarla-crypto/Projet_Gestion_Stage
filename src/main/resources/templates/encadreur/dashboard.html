<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tableau de bord - Encadreur</title>
    <link rel="stylesheet" th:href="@{/css/admin-layout.css}">
    <link rel="stylesheet" th:href="@{/css/admin-dashboard.css}">
</head>
<body>

<div th:replace="~{fragments/sidebar-encadreur :: sidebar}"></div>

<div class="contenu-principal">
    <div class="en-tete-page">
        <h1>Suivi du stagiaire</h1>
        <span class="utilisateur-connecte">Encadreur</span>
    </div>

    <div class="grille-cartes-stats">
        <div class="carte-stat bleu">
            <div class="libelle">Mes stagiaires</div>
            <div class="valeur" th:text="${nombreStagiaires}">0</div>
        </div>
        <div class="carte-stat vert">
            <div class="libelle">Taches</div>
            <div class="valeur" th:text="${nombreTaches}">0</div>
        </div>
        <div class="carte-stat orange">
            <div class="libelle">Livrables</div>
            <div class="valeur" th:text="${nombreLivrables}">0</div>
        </div>
    </div>

    <div class="grille-blocs">
        <div class="bloc-blanc">
            <h3>Actions rapides</h3>
            <a th:href="@{/encadreur/taches}" class="bouton-action">Gerer les taches</a>
            <a th:href="@{/encadreur/livrables}" class="bouton-action">Consulter les livrables</a>
            <a th:href="@{/encadreur/evaluations}" class="bouton-action">Effectuer une evaluation</a>
        </div>
    </div>
</div>

</body>
</html>
