<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Gestion des stages</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

    <div class="conteneur">
        <div class="panneau-gauche">
            <h1>Gestion des stages</h1>
            <p>Suivi complet du stage, du depot de candidature jusqu'a l'archivage.</p>
            <div class="carte-info">
                <strong>Cycle du stage</strong>
                <span>Demande, affectation, suivi, evaluation et cloture.</span>
            </div>
        </div>

        <div class="panneau-droit">
            <h2>Connexion</h2>
            <p class="sous-titre">Acces securise selon le role utilisateur</p>

            <div th:if="${param.error}" class="message-erreur">
                Email ou mot de passe incorrect.
            </div>
            <div th:if="${param.logout}" class="message-info">
                Vous avez ete deconnecte avec succes.
            </div>

            <form th:action="@{/login}" method="post">
                <label for="email">Email</label>
                <input type="email" id="email" name="username" placeholder="utilisateur@email.com" required autofocus>

                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="********" required>

                <button type="submit">Se connecter</button>
            </form>
        </div>
    </div>

</body>
</html>
