<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="sidebar" class="barre-laterale portal-sidebar">
    <div class="logo-app">DTA Alliance</div>
    <div class="sidebar-role">Responsable</div>
    <nav>
        <a th:href="@{/responsable/dashboard}" th:classappend="${activePage == 'dashboard'} ? ' actif'"><i class="fa-solid fa-gauge-high"></i> Tableau de bord</a>
        <a th:href="@{/responsable/demandes}" th:classappend="${activePage == 'demandes'} ? ' actif'"><i class="fa-solid fa-file-lines"></i> Demandes</a>
        <a th:href="@{/responsable/stagiaires}" th:classappend="${activePage == 'stagiaires'} ? ' actif'"><i class="fa-solid fa-users"></i> Stagiaires</a>
        <a th:href="@{/responsable/dossiers}" th:classappend="${activePage == 'dossiers'} ? ' actif'"><i class="fa-solid fa-folder-open"></i> Dossiers</a>
        <a th:href="@{/responsable/planning}" th:classappend="${activePage == 'planning'} ? ' actif'"><i class="fa-solid fa-calendar"></i> Planning</a>
        
        <a th:href="@{/profil}" th:classappend="${activePage == 'profil'} ? ' actif'"><i class="fa-solid fa-user"></i> Profil</a>
    </nav>
    <img class="sidebar-deco" th:src="@{/images/hero-background.png}" alt="">
    <div class="sidebar-profile-card"><div class="avatar">R</div><div class="info"><div class="name">Responsable</div><div class="badge-online">En ligne</div></div></div>
    <div th:replace="~{fragments/sidebar-user :: sidebar-user}"></div>
</div>

</body>
</html>
