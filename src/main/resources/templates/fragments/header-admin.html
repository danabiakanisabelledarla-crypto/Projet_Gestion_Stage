<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="header" class="admin-header">
    <div class="header-droite">
        <div class="header-icon-btn" onclick="toggleNotifDropdown(event)">
            <i class="fa-regular fa-bell"></i>
            <span class="notif-dot" th:text="${notificationsCount}">0</span>
            <div class="notif-dropdown" id="notifDropdown">...</div>
        </div>
        <a th:href="@{/admin/messages}" class="header-icon-btn">...</a>
        <div class="header-user">...</div>
    </div>
    <script>
        window.toggleNotifDropdown = function(event) {
            event.stopPropagation();
            var dd = document.getElementById('notifDropdown');
            if (dd) dd.classList.toggle('open');
        };
        document.addEventListener('click', function() {
            var dd = document.getElementById('notifDropdown');
            if (dd) dd.classList.remove('open');
        });
    </script>
</div>
</body>
</html>
