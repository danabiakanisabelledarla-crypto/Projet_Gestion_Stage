<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Suivre ma demande</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/accueil.css(v=3)}">
    <link rel="stylesheet" th:href="@{/css/suivi.css}">
</head>
<body>

<div th:replace="~{fragments/navbar-public :: navbar('suivi')}"></div>

<div class="conteneur-suivi">

    <!-- Formulaire : visible seulement si pas de résultat -->
    <div th:if="${demande == null}" class="carte-suivi">
        <h1>Suivre ma demande</h1>
        <p class="sous-titre">
            Entrez l'email utilise lors de votre candidature
            pour consulter l'etat de votre demande.
        </p>

        <div th:if="${erreur}" class="message-erreur" th:text="${erreur}"></div>

        <form th:action="@{/candidat/suivi}" method="post">
            <div class="groupe-champ">
                <label>Votre email</label>
                <input type="email" name="email"
                       placeholder="votre.email@exemple.com"
                       required autofocus>
            </div>
            <button type="submit" class="bouton-chercher">
                Rechercher ma demande
            </button>
        </form>
    </div>

    <!-- Résultat : visible seulement si demande trouvée -->
    <div th:if="${demande != null}" class="resultat-demande">

        <div class="resultat-entete">
            <h2>Etat de votre demande</h2>
            <span th:class="'statut-badge statut-' + ${demande.statut.name()}"
                  th:text="${demande.statut}">-</span>
        </div>

        <div class="ligne-info">
            <span class="libelle">Nom complet</span>
            <span class="valeur"
                  th:text="${demande.prenom + ' ' + demande.nom}">-</span>
        </div>
        <div class="ligne-info">
            <span class="libelle">Ecole</span>
            <span class="valeur" th:text="${demande.ecole}">-</span>
        </div>
        <div class="ligne-info">
            <span class="libelle">Filiere</span>
            <span class="valeur" th:text="${demande.filiere}">-</span>
        </div>
        <div class="ligne-info">
            <span class="libelle">Niveau</span>
            <span class="valeur" th:text="${demande.niveau}">-</span>
        </div>
        <div class="ligne-info">
            <span class="libelle">Duree souhaitee</span>
            <span class="valeur" th:text="${demande.dureeSouhaitee}">-</span>
        </div>
        <div class="ligne-info">
            <span class="libelle">Date de depot</span>
            <span class="valeur"
                  th:text="${#temporals.format(demande.dateDemande, 'dd/MM/yyyy HH:mm')}">-</span>
        </div>

        <div th:if="${demande.commentaire != null
                     and !demande.commentaire.isEmpty()
                     and !demande.commentaire.startsWith('Email candidat')}"
             class="ligne-info">
            <span class="libelle">Commentaire</span>
            <span class="valeur" th:text="${demande.commentaire}">-</span>
        </div>

        <div class="resultat-actions">
            <a th:href="@{/candidat/suivi}" class="btn-nouvelle-recherche">
                ← Nouvelle recherche
            </a>
            <a th:href="@{/candidat/demande}" class="btn-nouvelle-demande">
                Deposer une autre demande
            </a>
        </div>
    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
