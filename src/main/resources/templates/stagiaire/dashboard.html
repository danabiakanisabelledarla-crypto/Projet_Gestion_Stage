<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tableau de bord - Stagiaire</title>
    <link rel="stylesheet" th:href="@{/css/admin-layout.css}">
    <link rel="stylesheet" th:href="@{/css/admin-dashboard.css}">
</head>
<body>

<div th:replace="~{fragments/sidebar-stagiaire :: sidebar}"></div>

<div class="contenu-principal">
    <div class="en-tete-page">
        <h1 th:text="'Bienvenue ' + ${nomComplet}">Bienvenue</h1>
        <span class="utilisateur-connecte">Stagiaire</span>
    </div>

    <div th:if="${stage == null}" class="bloc-blanc" style="margin-bottom: 20px;">
        <p style="color:#777;">Vous n'avez pas encore de stage affecte. Contactez le responsable des stages.</p>
    </div>

    <div th:if="${stage != null}">
        <div class="bloc-blanc" style="margin-bottom: 25px;">
            <h3>Plateforme de gestion des stages</h3>
            <p style="color:#777; margin-top: 8px; font-size: 14px;">
                Encadreur :
                <span th:text="${stage.encadreur.utilisateur.prenom + ' ' + stage.encadreur.utilisateur.nom}">-</span>
                | Service :
                <span th:text="${stage.service.nom}">-</span>
            </p>
        </div>

        <div class="grille-cartes-stats">
            <div class="carte-stat bleu">
                <div class="libelle">Taches</div>
                <div class="valeur" th:text="${nombreTaches}">0</div>
                <div style="font-size:12px; color:#555; margin-top:4px;">en cours</div>
            </div>
            <div class="carte-stat vert">
                <div class="libelle">Livrables</div>
                <div class="valeur" th:text="${nombreLivrables}">0</div>
                <div style="font-size:12px; color:#555; margin-top:4px;">deposes</div>
            </div>
            <div class="carte-stat orange">
                <div class="libelle">Journal</div>
                <div class="valeur" th:text="${nombreJours}">0</div>
                <div style="font-size:12px; color:#555; margin-top:4px;">jours saisis</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
