<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Objectifs - Stagiaire</title>
    <link rel="stylesheet" th:href="@{/css/admin-layout.css}">
    <link rel="stylesheet" th:href="@{/css/admin-portal.css}">
    <link rel="stylesheet" th:href="@{/css/taches-journal.css}">
    <link rel="stylesheet" th:href="@{/css/stagiaire-pages.css}">
</head>
<body>
    <div th:replace="~{fragments/sidebar-stagiaire :: sidebar}"></div>

    <div class="contenu-principal">
        <div class="en-tete-page">
            <h1>🎯 Mes Objectifs</h1>
            <span class="utilisateur-connecte" th:text="${utilisateur.prenom + ' ' + utilisateur.nom}">Stagiaire</span>
        </div>

        <div class="bloc-blanc">
            <h3>Résumé des objectifs</h3>
            <p th:text="'Total : ' + ${objectifs.size()} + ' objectifs'"></p>
        </div>

        <div class="grille-cartes" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px;">
            
            <div th:each="objectif : ${objectifs}" class="bloc-blanc" style="padding: 20px;">
                <h4 th:text="${objectif.titre}"></h4>
                <p th:text="${objectif.description}"></p>
                
                <div style="margin-top: 15px; font-size: 14px;">
                    <strong>Date limite :</strong> <span th:text="${objectif.dateLimite}"></span><br>
                    <strong>Priorité :</strong> <span th:text="${objectif.priorite}"></span><br>
                    <strong>Progression :</strong> <span th:text="${objectif.progression} + '%'"></span>
                </div>
                
                <span th:class="'badge-statut ' + ${objectif.statut.name()}" 
                      th:text="${objectif.statut}"></span>
            </div>

            <div th:if="${#lists.isEmpty(objectifs)}" class="bloc-blanc" style="grid-column: 1 / -1; text-align: center; padding: 40px;">
                Aucun objectif défini pour le moment.
            </div>
        </div>
    </div>
</body>
</html>
