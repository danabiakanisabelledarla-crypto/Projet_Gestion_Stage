<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rapport Final - Stagiaire</title>
    <link rel="stylesheet" th:href="@{/css/admin-layout.css}">
    <link rel="stylesheet" th:href="@{/css/admin-portal.css}">
    <link rel="stylesheet" th:href="@{/css/taches-journal.css}">
    <link rel="stylesheet" th:href="@{/css/stagiaire-pages.css}">
</head>
<body>
    <div th:replace="~{fragments/sidebar-stagiaire :: sidebar}"></div>

    <div class="contenu-principal">
        <div class="en-tete-page">
            <h1>📄 Rapport Final</h1>
            <span class="utilisateur-connecte" th:text="${utilisateur.prenom + ' ' + utilisateur.nom}">Stagiaire</span>
        </div>

        <div th:if="${stage != null}" class="bloc-blanc" style="padding: 25px;">
            
            <!-- Haut : Informations générales -->
            <h3>Informations générales</h3>
            <p><strong>Nom du stagiaire :</strong> <span th:text="${stage.stagiaire.utilisateur.prenom + ' ' + stage.stagiaire.utilisateur.nom}"></span></p>
            <p><strong>Sujet du stage :</strong> <span th:text="${stage.sujet}"></span></p>
            <p><strong>Encadreur :</strong> <span th:text="${stage.encadreur.utilisateur.prenom + ' ' + stage.encadreur.utilisateur.nom}"></span></p>
            <p><strong>Période :</strong> <span th:text="${stage.dateDebut} + ' au ' + ${stage.dateFin}"></span></p>

            <hr>

            <!-- Centre : Dernière version -->
            <h3>Dernière version du rapport</h3>
            <div th:if="${#lists.isEmpty(rapports)}">
                <p>Aucune version déposée pour le moment.</p>
            </div>
            
            <div th:each="rapport : ${rapports}" style="background: #f9f9f9; padding: 15px; margin-bottom: 15px; border-radius: 8px;">
                <strong th:text="${rapport.nom}"></strong><br>
                <small>Date de dépôt : <span th:text="${rapport.dateCreation}"></span></small><br>
                <small>Statut : <span th:text="${rapport.statut}"></span></small>
            </div>

            <!-- Boutons d'action -->
            <div style="margin-top: 30px;">
                <form th:action="@{/stagiaire/rapport/deposer}" method="post" enctype="multipart/form-data" style="display: inline;">
                    <input type="text" name="titre" placeholder="Titre de la version" required>
                    <input type="file" name="fichier" required>
                    <button type="submit" class="btn btn-primary">Déposer une nouvelle version</button>
                </form>
                
                <a href="#" class="btn btn-success" style="margin-left: 10px;">Télécharger</a>
                <a href="#" class="btn btn-secondary" style="margin-left: 10px;">Voir les remarques</a>
            </div>
        </div>

        <div th:if="${stage == null}" class="bloc-blanc">
            <p>Vous n'avez pas encore de stage assigné.</p>
        </div>
    </div>
</body>
</html>
