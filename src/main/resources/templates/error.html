<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Erreur — DTA Alliance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/accueil.css}">
    <link rel="stylesheet" th:href="@{/css/pages.css}">
    <style>
        .error-page { text-align:center; padding:100px 24px; }
        .error-code { font-size:6rem; font-weight:800; color:#dc2626; line-height:1; }
        .error-page h1 { font-size:1.8rem; margin:20px 0 12px; color:#03142D; }
        .error-page p { color:#64748B; margin-bottom:30px; }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar-public :: navbar('')}"></div>
<div class="error-page">
    <div class="error-code"><i class="fa-solid fa-triangle-exclamation"></i></div>
    <h1>Une erreur est survenue</h1>
    <p>Désolé, quelque chose s'est mal passé. Veuillez réessayer ou retourner à l'accueil.</p>
    <a th:href="@{/}" class="btn-primary"><i class="fa-solid fa-house"></i> Retour à l'accueil</a>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
