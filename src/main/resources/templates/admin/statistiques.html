<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Statistiques - Administrateur</title>
    <link rel="stylesheet" th:href="@{/css/admin-layout.css}">
    <link rel="stylesheet" th:href="@{/css/admin-dashboard.css}">
</head>
<body>

<div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>

<div class="contenu-principal">
    <div class="en-tete-page">
        <h1>Statistiques</h1>
        <span class="utilisateur-connecte">Admin</span>
    </div>

    <div class="grille-cartes-stats">
        <div class="carte-stat bleu">
            <div class="libelle">Demandes</div>
            <div class="valeur" th:text="${nombreDemandes}">0</div>
        </div>

        <div class="carte-stat vert">
            <div class="libelle">Stagiaires</div>
            <div class="valeur" th:text="${nombreStagiaires}">0</div>
        </div>

        <div class="carte-stat orange">
            <div class="libelle">Encadreurs</div>
            <div class="valeur" th:text="${nombreEncadreurs}">0</div>
        </div>

        <div class="carte-stat violet">
            <div class="libelle">Taches</div>
            <div class="valeur" th:text="${nombreTaches}">0</div>
        </div>
    </div>

    <div class="grille-blocs">
        <div class="bloc-blanc">
            <h3>Stages</h3>
            <p style="color:#777; font-size: 14px;">
                Total :
                <strong th:text="${nombreStages}">0</strong>
            </p>
            <p style="color:#777; font-size: 14px;">
                En cours :
                <strong th:text="${stagesEnCours}">0</strong>
            </p>
            <p style="color:#777; font-size: 14px;">
                Termines :
                <strong th:text="${stagesTermines}">0</strong>
            </p>
        </div>

        <div class="bloc-blanc">
            <h3>Resume general</h3>
            <p style="color:#777; font-size: 14px;">
                Cette page regroupe les principaux indicateurs du systeme de gestion des stages.
            </p>
        </div>
    </div>
</div>

</body>
</html>
