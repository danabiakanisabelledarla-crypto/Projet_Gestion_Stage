<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Messages - Administration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin-layout.css}">
</head>
<body>
<div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>
<div class="contenu-principal">
    <div th:replace="~{fragments/header-admin :: header}"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:20px;">
        <h2 style="margin:0;font-size:22px;color:#1E3A8A;"><i class="fa-solid fa-comments" style="color:#2563EB;"></i> Messagerie</h2>
    </div>
    <div class="messages-layout">
        <!-- Colonne gauche -->
        <div class="conversations-list">
            <div class="conversations-header">
                <h2>Conversations</h2>
                <span class="conversations-count" th:text="${#lists.size(conversations)}">0</span>
            </div>
            <div class="conversations-search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Rechercher...">
            </div>
            <div class="conversations-items">
                <a th:each="conv : ${conversations}"
                   th:href="@{/admin/messages(convId=${conv.id})}"
                   style="text-decoration:none;display:block;">
                    <div class="conversation-item" th:classappend="${conv.id == activeConversation?.id} ? 'active' : ''">
                        <div class="conv-avatar">C</div>
                        <div class="conv-info">
                            <div class="conv-nom" th:text="${conv.sujet != null ? conv.sujet : 'Sans sujet'}">Sujet</div>
                            <div class="conv-fonction">
                                <span th:each="p : ${conv.participants}" th:text="${p.prenom + ' ' + p.nom + ' '}">participant</span>
                            </div>
                            <div class="conv-dernier-msg">
                                <span th:if="${conv.dernierMessage != null}" th:text="${#temporals.format(conv.dernierMessage, 'dd/MM HH:mm')}">date</span>
                                <span th:if="${conv.dernierMessage == null}">Aucun message</span>
                            </div>
                        </div>
                    </div>
                </a>
                <div th:if="${#lists.isEmpty(conversations)}" style="text-align:center;padding:40px 20px;color:#94A3B8;">
                    <i class="fa-regular fa-comment-dots" style="font-size:28px;display:block;margin-bottom:8px;"></i>
                    Aucune conversation
                </div>
            </div>
            <div class="conversations-footer" th:text="${#lists.size(conversations)} + ' conversation(s)'">0</div>
        </div>
        <!-- Colonne droite -->
        <div class="discussion-panel" th:if="${activeConversation != null}">
            <div class="discussion-header">
                <div class="discussion-user">
                    <div class="discussion-avatar">C</div>
                    <div>
                        <div class="discussion-nom" th:text="${activeConversation.sujet}">Sujet</div>
                        <div class="discussion-statut">
                            <span th:each="p : ${activeConversation.participants}" th:text="${p.prenom + ' ' + p.nom}">participant</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="discussion-messages">
                <div class="message" th:each="msg : ${messages}"
                     th:classappend="${msg.expediteur.id == 1} ? 'envoye' : 'recu'">
                    <div class="msg-avatar" th:if="${msg.expediteur.id != 1}" th:text="${msg.expediteur.prenom.substring(0,1).toUpperCase() + msg.expediteur.nom.substring(0,1).toUpperCase()}">E</div>
                    <div class="msg-bulle" th:classappend="${msg.expediteur.id == 1} ? 'envoye' : ''">
                        <p th:text="${msg.contenu}">Message</p>
                        <span class="msg-heure" th:text="${#temporals.format(msg.dateEnvoi, 'HH:mm')}">heure</span>
                    </div>
                </div>
            </div>
            <form class="discussion-input" th:action="@{/admin/messages/envoyer}" method="POST">
                <input type="hidden" name="convId" th:value="${activeConversation.id}">
                <div class="input-actions">
                    <button type="button"><i class="fa-solid fa-paperclip"></i></button>
                    <button type="button"><i class="fa-solid fa-image"></i></button>
                    <button type="button"><i class="fa-regular fa-face-smile"></i></button>
                </div>
                <input type="text" name="contenu" class="input-message" placeholder="Ecrire un message..." required>
                <button type="submit" class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </form>
        </div>
        <div class="discussion-panel" th:if="${activeConversation == null}"
             style="display:flex;align-items:center;justify-content:center;color:#94A3B8;">
            <div style="text-align:center;">
                <i class="fa-regular fa-comment-dots" style="font-size:48px;margin-bottom:12px;"></i>
                <p>Selectionnez une conversation</p>
            </div>
        </div>
    </div>
</div>

<style>
.messages-layout { display: flex; height: calc(100vh - 140px); gap: 0; margin-top: 16px; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
.conversations-list { width: 360px; flex-shrink: 0; border-right: 1px solid #F1F5F9; display: flex; flex-direction: column; background: #FAFBFC; }
.conversations-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #F1F5F9; }
.conversations-header h2 { margin: 0; font-size: 16px; color: #1E293B; }
.conversations-count { background: #DBEAFE; color: #2563EB; padding: 2px 10px; border-radius: 12px; font-size: 13px; font-weight: 700; }
.conversations-search { display: flex; align-items: center; gap: 10px; padding: 12px 20px; border-bottom: 1px solid #F1F5F9; }
.conversations-search i { color: #94A3B8; font-size: 14px; }
.conversations-search input { border: none; background: transparent; outline: none; font-family: 'Poppins', sans-serif; font-size: 13px; color: #0f172a; flex: 1; }
.conversations-search input::placeholder { color: #94A3B8; }
.conversations-items { flex: 1; overflow-y: auto; }
.conversation-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; cursor: pointer; border-bottom: 1px solid #F8FAFC; }
.conversation-item:hover { background: #F1F5F9; }
.conversation-item.active { background: #DBEAFE; }
.conv-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #2563EB, #3B82F6); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex-shrink: 0; }
.conv-info { flex: 1; min-width: 0; }
.conv-nom { font-size: 13px; font-weight: 700; color: #1E293B; }
.conv-fonction { font-size: 11px; color: #64748B; }
.conv-dernier-msg { font-size: 12px; color: #94A3B8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conversations-footer { padding: 12px 20px; border-top: 1px solid #F1F5F9; font-size: 12px; color: #94A3B8; text-align: center; }
.discussion-panel { flex: 1; display: flex; flex-direction: column; }
.discussion-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid #F1F5F9; }
.discussion-user { display: flex; align-items: center; gap: 12px; }
.discussion-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #2563EB, #3B82F6); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
.discussion-nom { font-size: 15px; font-weight: 700; color: #1E293B; }
.discussion-statut { font-size: 12px; color: #64748B; }
.discussion-messages { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
.message { display: flex; gap: 10px; max-width: 70%; }
.message.envoye { align-self: flex-end; flex-direction: row-reverse; }
.msg-avatar { width: 36px; height: 36px; border-radius: 50%; background: #E5E7EB; color: #64748B; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.msg-bulle { background: #F1F5F9; padding: 12px 16px; border-radius: 16px; border-bottom-left-radius: 4px; }
.msg-bulle.envoye { background: #2563EB; color: white; border-bottom-left-radius: 16px; border-bottom-right-radius: 4px; }
.msg-bulle p { margin: 0; font-size: 13px; line-height: 1.5; }
.msg-heure { font-size: 11px; color: #94A3B8; margin-top: 4px; display: block; }
.msg-bulle.envoye .msg-heure { color: rgba(255,255,255,0.7); }
.discussion-input { display: flex; align-items: center; gap: 12px; padding: 16px 24px; border-top: 1px solid #F1F5F9; }
.input-actions { display: flex; gap: 8px; }
.input-actions button { width: 36px; height: 36px; border-radius: 50%; border: none; background: transparent; color: #94A3B8; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.input-actions button:hover { background: #F1F5F9; color: #475569; }
.input-message { flex: 1; padding: 10px 16px; border: 1.5px solid #E5E7EB; border-radius: 24px; font-family: 'Poppins', sans-serif; font-size: 13px; color: #1E293B; outline: none; }
.input-message:focus { border-color: #2563EB; }
.send-btn { width: 42px; height: 42px; border-radius: 50%; border: none; background: #2563EB; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.send-btn:hover { background: #1d4ed8; transform: scale(1.05); }
</style>

</body>
</html>
