<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Encadreurs - Administrateur</title>
    <link rel="stylesheet" th:href="@{/css/admin-layout.css}">
    <link rel="stylesheet" th:href="@{/css/demandes.css}">
</head>
<body>

<div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>

<div class="contenu-principal">
    <div class="en-tete-page">
        <h1>Encadreurs</h1>
        <span class="utilisateur-connecte">Admin</span>
    </div>

    <table class="tableau-demandes">
        <thead>
            <tr>
                <th>Nom complet</th>
                <th>Email</th>
                <th>Specialite</th>
                <th>Fonction</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="encadreur : ${encadreurs}">
                <td th:text="${encadreur.utilisateur.prenom + ' ' + encadreur.utilisateur.nom}">
                    Nom encadreur
                </td>
                <td th:text="${encadreur.utilisateur.email}">email</td>
                <td th:text="${encadreur.specialite}">Specialite</td>
                <td th:text="${encadreur.fonction}">Fonction</td>
            </tr>

            <tr th:if="${#lists.isEmpty(encadreurs)}">
                <td colspan="4" style="text-align:center; color:#777; padding: 30px;">
                    Aucun encadreur trouve.
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
