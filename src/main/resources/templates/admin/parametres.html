<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Paramètres — Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin-layout.css}">
    <link rel="stylesheet" th:href="@{/css/demandes.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
<div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>
<div class="contenu-principal">
    <div th:replace="~{fragments/header-admin :: header}"></div>
    <div th:if="${succes}" class="alert-portal success" th:text="${succes}"></div>
    <div class="page-entete">
        <div class="page-entete-gauche">
            <div class="page-icon"><i class="fa-solid fa-gear"></i></div>
            <div>
                <h1>Paramètres généraux</h1>
                <p class="page-sous-titre">Configurez les paramètres généraux de la plateforme.</p>
            </div>
        </div>
    </div>
    <div class="settings-layout">
        <div class="settings-menu portal-card">
            <a href="#" class="active">Général</a>
            <a href="#">Email</a>
            <a href="#">Apparence</a>
        </div>
        <div class="portal-card">
            <form th:action="@{/admin/parametres}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group"><label>Nom de la plateforme</label><input type="text" value="DTA Alliance — Gestion des Stages"></div>
                <div class="form-group"><label>Email de contact</label><input type="email" value="contact@dta-alliance.com"></div>
                <div class="form-group"><label>Téléphone</label><input type="text" value="+237 222 222 222"></div>
                <div class="form-group"><label>Adresse</label><input type="text" value="Yaoundé, Cameroun"></div>
                <div class="form-group"><label>Durée par défaut du stage</label><input type="text" value="3 mois"></div>
                <div class="form-group"><label>Couleur principale</label><input type="color" value="#2563EB"></div>
                <button type="submit" class="btn-portal-primary">Enregistrer les modifications</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
