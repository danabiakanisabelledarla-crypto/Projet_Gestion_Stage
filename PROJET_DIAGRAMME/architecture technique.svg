<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1150" viewBox="0 0 1700 1150">
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .title { font-family: Arial, sans-serif; font-size: 32px; font-weight: 700; fill: #182230; }
      .subtitle { font-family: Arial, sans-serif; font-size: 18px; fill: #475467; }
      .box { fill: #ffffff; stroke: #344054; stroke-width: 2; rx: 12; }
      .blue { fill: #eaf2ff; stroke: #2563eb; stroke-width: 2; rx: 12; }
      .green { fill: #eafaf0; stroke: #16a34a; stroke-width: 2; rx: 12; }
      .orange { fill: #fff4e6; stroke: #ea580c; stroke-width: 2; rx: 12; }
      .purple { fill: #f2edff; stroke: #7c3aed; stroke-width: 2; rx: 12; }
      .dark { fill: #1f2937; stroke: #111827; stroke-width: 2; rx: 12; }
      .text { font-family: Arial, sans-serif; fill: #182230; }
      .white { font-family: Arial, sans-serif; fill: #ffffff; }
      .muted { font-family: Arial, sans-serif; fill: #667085; }
      .h1 { font-size: 22px; font-weight: 700; }
      .h2 { font-size: 17px; font-weight: 700; }
      .small { font-size: 14px; }
      .xs { font-size: 12px; }
      .arrow { stroke: #667085; stroke-width: 3; fill: none; marker-end: url(#arrowHead); }
      .dash { stroke: #98a2b3; stroke-width: 2; fill: none; stroke-dasharray: 8 7; }
      .line { stroke: #d0d5dd; stroke-width: 1.3; }
    </style>
    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#667085"/>
    </marker>
  </defs>

  <rect class="bg" width="1700" height="1150"/>
  <text class="title" x="850" y="50" text-anchor="middle">Architecture technique</text>
  <text class="subtitle" x="850" y="82" text-anchor="middle">Plateforme numerique de gestion et de suivi des stages</text>

  <!-- Users -->
  <g transform="translate(70 150)">
    <rect class="dark" width="250" height="420"/>
    <text class="white h1" x="125" y="48" text-anchor="middle">Utilisateurs</text>
    <rect class="box" x="35" y="85" width="180" height="55"/>
    <text class="text h2" x="125" y="119" text-anchor="middle">Administrateur</text>
    <rect class="box" x="35" y="165" width="180" height="55"/>
    <text class="text h2" x="125" y="199" text-anchor="middle">Responsable</text>
    <rect class="box" x="35" y="245" width="180" height="55"/>
    <text class="text h2" x="125" y="279" text-anchor="middle">Encadreur</text>
    <rect class="box" x="35" y="325" width="180" height="55"/>
    <text class="text h2" x="125" y="359" text-anchor="middle">Stagiaire</text>
  </g>

  <!-- Frontend -->
  <g transform="translate(430 145)">
    <rect class="blue" width="300" height="430"/>
    <text class="text h1" x="150" y="45" text-anchor="middle">Couche presentation</text>
    <text class="muted small" x="150" y="75" text-anchor="middle">Frontend</text>
    <rect class="box" x="45" y="115" width="210" height="58"/>
    <text class="text h2" x="150" y="149" text-anchor="middle">HTML</text>
    <rect class="box" x="45" y="195" width="210" height="58"/>
    <text class="text h2" x="150" y="229" text-anchor="middle">CSS / Bootstrap</text>
    <rect class="box" x="45" y="275" width="210" height="58"/>
    <text class="text h2" x="150" y="309" text-anchor="middle">Thymeleaf</text>
    <text class="muted xs" x="150" y="375" text-anchor="middle">Pages de connexion, tableaux de bord,</text>
    <text class="muted xs" x="150" y="395" text-anchor="middle">formulaires et tableaux de suivi</text>
  </g>

  <!-- Controllers -->
  <g transform="translate(830 145)">
    <rect class="green" width="300" height="430"/>
    <text class="text h1" x="150" y="45" text-anchor="middle">Couche controleur</text>
    <text class="muted small" x="150" y="75" text-anchor="middle">Spring MVC</text>
    <rect class="box" x="45" y="105" width="210" height="48"/>
    <text class="text h2" x="150" y="135" text-anchor="middle">AuthController</text>
    <rect class="box" x="45" y="170" width="210" height="48"/>
    <text class="text h2" x="150" y="200" text-anchor="middle">AdminController</text>
    <rect class="box" x="45" y="235" width="210" height="48"/>
    <text class="text h2" x="150" y="265" text-anchor="middle">StageController</text>
    <rect class="box" x="45" y="300" width="210" height="48"/>
    <text class="text h2" x="150" y="330" text-anchor="middle">EvaluationController</text>
    <text class="muted xs" x="150" y="385" text-anchor="middle">Recoit les actions et oriente</text>
    <text class="muted xs" x="150" y="405" text-anchor="middle">vers les services metier</text>
  </g>

  <!-- Services -->
  <g transform="translate(1230 145)">
    <rect class="orange" width="330" height="430"/>
    <text class="text h1" x="165" y="45" text-anchor="middle">Couche service</text>
    <text class="muted small" x="165" y="75" text-anchor="middle">Logique metier</text>
    <rect class="box" x="50" y="105" width="230" height="48"/>
    <text class="text h2" x="165" y="135" text-anchor="middle">DemandeStageService</text>
    <rect class="box" x="50" y="170" width="230" height="48"/>
    <text class="text h2" x="165" y="200" text-anchor="middle">StagiaireService</text>
    <rect class="box" x="50" y="235" width="230" height="48"/>
    <text class="text h2" x="165" y="265" text-anchor="middle">TacheService</text>
    <rect class="box" x="50" y="300" width="230" height="48"/>
    <text class="text h2" x="165" y="330" text-anchor="middle">EvaluationService</text>
    <text class="muted xs" x="165" y="385" text-anchor="middle">Traitement des demandes, affectations,</text>
    <text class="muted xs" x="165" y="405" text-anchor="middle">validations, evaluations et statistiques</text>
  </g>

  <!-- Bottom repositories and database -->
  <g transform="translate(430 710)">
    <rect class="purple" width="500" height="270"/>
    <text class="text h1" x="250" y="45" text-anchor="middle">Couche repository</text>
    <text class="muted small" x="250" y="75" text-anchor="middle">Spring Data JPA</text>
    <rect class="box" x="45" y="110" width="190" height="45"/>
    <text class="text h2" x="140" y="138" text-anchor="middle">UtilisateurRepository</text>
    <rect class="box" x="265" y="110" width="190" height="45"/>
    <text class="text h2" x="360" y="138" text-anchor="middle">StageRepository</text>
    <rect class="box" x="45" y="175" width="190" height="45"/>
    <text class="text h2" x="140" y="203" text-anchor="middle">TacheRepository</text>
    <rect class="box" x="265" y="175" width="190" height="45"/>
    <text class="text h2" x="360" y="203" text-anchor="middle">EvaluationRepository</text>
  </g>

  <g transform="translate(1050 710)">
    <rect class="dark" width="510" height="270"/>
    <text class="white h1" x="255" y="45" text-anchor="middle">Base de donnees MySQL</text>
    <text class="white small" x="255" y="75" text-anchor="middle">gestion_stages</text>
    <rect class="box" x="45" y="110" width="125" height="45"/>
    <text class="text h2" x="107" y="138" text-anchor="middle">utilisateurs</text>
    <rect class="box" x="195" y="110" width="125" height="45"/>
    <text class="text h2" x="257" y="138" text-anchor="middle">stages</text>
    <rect class="box" x="345" y="110" width="125" height="45"/>
    <text class="text h2" x="407" y="138" text-anchor="middle">taches</text>
    <rect class="box" x="45" y="175" width="125" height="45"/>
    <text class="text h2" x="107" y="203" text-anchor="middle">livrables</text>
    <rect class="box" x="195" y="175" width="125" height="45"/>
    <text class="text h2" x="257" y="203" text-anchor="middle">evaluations</text>
    <rect class="box" x="345" y="175" width="125" height="45"/>
    <text class="text h2" x="407" y="203" text-anchor="middle">archives</text>
  </g>

  <!-- Security band -->
  <g transform="translate(70 650)">
    <rect class="box" width="250" height="220"/>
    <text class="text h1" x="125" y="42" text-anchor="middle">Securite</text>
    <text class="muted small" x="125" y="75" text-anchor="middle">Spring Security</text>
    <line class="line" x1="35" y1="100" x2="215" y2="100"/>
    <text class="text small" x="45" y="130">Connexion</text>
    <text class="text small" x="45" y="160">Roles</text>
    <text class="text small" x="45" y="190">Autorisations</text>
  </g>

  <!-- Arrows -->
  <path class="arrow" d="M320 360 L430 360"/>
  <path class="arrow" d="M730 360 L830 360"/>
  <path class="arrow" d="M1130 360 L1230 360"/>
  <path class="arrow" d="M1395 575 C1300 660 1060 690 930 760"/>
  <path class="arrow" d="M930 845 L1050 845"/>
  <path class="dash" d="M320 760 C365 620 390 500 430 410"/>
  <path class="dash" d="M320 720 C545 640 740 575 845 500"/>

  <text class="muted small" x="850" y="1060" text-anchor="middle">Flux principal : utilisateur -> interface -> controleur -> service -> repository -> base de donnees</text>
</svg>
