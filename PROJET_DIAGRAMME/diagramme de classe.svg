<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1250" viewBox="0 0 1800 1250">
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .title { font-family: Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #182230; }
      .subtitle { font-family: Arial, sans-serif; font-size: 18px; fill: #475467; }
      .class { fill: #ffffff; stroke: #344054; stroke-width: 2; rx: 8; }
      .head { fill: #eaf2ff; stroke: #344054; stroke-width: 2; }
      .head-green { fill: #eafaf0; stroke: #344054; stroke-width: 2; }
      .head-orange { fill: #fff4e6; stroke: #344054; stroke-width: 2; }
      .head-purple { fill: #f2edff; stroke: #344054; stroke-width: 2; }
      .class-name { font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #182230; text-anchor: middle; }
      .attr { font-family: Arial, sans-serif; font-size: 13px; fill: #344054; }
      .rel { stroke: #667085; stroke-width: 2; fill: none; }
      .label { font-family: Arial, sans-serif; font-size: 13px; fill: #475467; font-weight: 700; }
      .legend { font-family: Arial, sans-serif; font-size: 14px; fill: #344054; }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1250"/>
  <text class="title" x="900" y="45" text-anchor="middle">Diagramme de classes</text>
  <text class="subtitle" x="900" y="75" text-anchor="middle">Plateforme numerique de gestion et de suivi des stages</text>

  <!-- Class helper pattern: outer rect, header, name, attrs -->
  <g transform="translate(70 125)">
    <rect class="class" width="230" height="145"/>
    <rect class="head" width="230" height="38"/>
    <text class="class-name" x="115" y="25">Role</text>
    <text class="attr" x="14" y="62">+ id : int</text>
    <text class="attr" x="14" y="84">+ libelle : String</text>
    <text class="attr" x="14" y="106">+ description : String</text>
  </g>

  <g transform="translate(380 110)">
    <rect class="class" width="250" height="215"/>
    <rect class="head" width="250" height="38"/>
    <text class="class-name" x="125" y="25">Utilisateur</text>
    <text class="attr" x="14" y="62">+ id : int</text>
    <text class="attr" x="14" y="84">+ nom : String</text>
    <text class="attr" x="14" y="106">+ prenom : String</text>
    <text class="attr" x="14" y="128">+ email : String</text>
    <text class="attr" x="14" y="150">+ motDePasse : String</text>
    <text class="attr" x="14" y="172">+ telephone : String</text>
    <text class="attr" x="14" y="194">+ statut : String</text>
  </g>

  <g transform="translate(720 105)">
