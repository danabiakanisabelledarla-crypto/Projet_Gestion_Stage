    <text class="attr" x="14" y="106">+ dateEvaluation : Date</text>
    <text class="attr" x="14" y="128">+ appreciation : String</text>
  </g>

  <g transform="translate(775 1010)">
    <rect class="class" width="260" height="130"/>
    <rect class="head" width="260" height="38"/>
    <text class="class-name" x="130" y="25">NoteEvaluation</text>
    <text class="attr" x="14" y="62">+ id : int</text>
    <text class="attr" x="14" y="84">+ note : float</text>
    <text class="attr" x="14" y="106">+ commentaire : String</text>
  </g>

  <g transform="translate(1140 1010)">
    <rect class="class" width="270" height="130"/>
    <rect class="head" width="270" height="38"/>
