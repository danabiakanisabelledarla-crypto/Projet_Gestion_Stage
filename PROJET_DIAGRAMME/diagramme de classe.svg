    <text class="attr" x="14" y="62">+ id : int</text>
    <text class="attr" x="14" y="84">+ numeroStage : String</text>
    <text class="attr" x="14" y="106">+ dateDebut : Date</text>
    <text class="attr" x="14" y="128">+ dateFin : Date</text>
    <text class="attr" x="14" y="150">+ duree : String</text>
    <text class="attr" x="14" y="172">+ statut : String</text>
  </g>

  <g transform="translate(1120 420)">
    <rect class="class" width="240" height="145"/>
