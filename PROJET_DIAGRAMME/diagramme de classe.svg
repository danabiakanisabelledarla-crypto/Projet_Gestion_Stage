    <text class="attr" x="14" y="62">+ id : int</text>
    <text class="attr" x="14" y="84">+ nom : String</text>
    <text class="attr" x="14" y="106">+ prenom : String</text>
    <text class="attr" x="14" y="128">+ ecole : String</text>
    <text class="attr" x="14" y="150">+ filiere : String</text>
    <text class="attr" x="14" y="172">+ niveau : String</text>
    <text class="attr" x="14" y="194">+ dureeSouhaitee : String</text>
    <text class="attr" x="14" y="216">+ statut : String</text>
  </g>

  <g transform="translate(1090 130)">
    <rect class="class" width="260" height="170"/>
