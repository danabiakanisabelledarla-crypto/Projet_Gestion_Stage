<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1300" viewBox="0 0 1800 1300">
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .title { font-family: Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #182230; }
      .subtitle { font-family: Arial, sans-serif; font-size: 18px; fill: #475467; }
      .table { fill: #ffffff; stroke: #344054; stroke-width: 2; rx: 8; }
      .head { fill: #eaf2ff; stroke: #344054; stroke-width: 2; }
