      .pk { font-weight: 700; fill: #0f766e; }
      .fk { fill: #b45309; }
      .rel { stroke: #667085; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .legend { font-family: Arial, sans-serif; font-size: 14px; fill: #344054; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
