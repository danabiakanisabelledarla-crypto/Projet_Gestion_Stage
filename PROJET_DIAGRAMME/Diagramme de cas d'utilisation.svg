  <!-- Include / extension notes -->
  <path class="dash" d="M620 232 C665 245 700 260 745 276"/>
  <text class="dash-text" x="690" y="246">inclut</text>
  <path class="dash" d="M820 316 C820 326 820 338 820 350"/>
  <text class="dash-text" x="855" y="335">apres admission</text>
  <path class="dash" d="M940 510 C975 510 1005 510 1040 510"/>
