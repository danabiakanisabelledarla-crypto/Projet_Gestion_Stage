<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050">
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .system { fill: #ffffff; stroke: #2f3a4a; stroke-width: 2.5; rx: 14; }
      .title { font-family: Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #182230; }
      .subtitle { font-family: Arial, sans-serif; font-size: 18px; fill: #475467; }
      .actor-label { font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #182230; text-anchor: middle; }
      .usecase { fill: #eef6ff; stroke: #2563eb; stroke-width: 2; }
      .usecase-alt { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; }
      .usecase-warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; }
      .usecase-text { font-family: Arial, sans-serif; font-size: 15px; fill: #182230; text-anchor: middle; dominant-baseline: middle; }
      .section { font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #344054; text-anchor: middle; }
      .line { stroke: #667085; stroke-width: 2; fill: none; }
      .dash { stroke: #98a2b3; stroke-width: 1.8; fill: none; stroke-dasharray: 8 6; }
      .dash-text { font-family: Arial, sans-serif; font-size: 13px; fill: #667085; text-anchor: middle; }
      .stick { stroke: #111827; stroke-width: 3; fill: none; stroke-linecap: round; }
      .head { fill: #ffffff; stroke: #111827; stroke-width: 3; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1050"/>
  <text class="title" x="800" y="46" text-anchor="middle">Diagramme de cas d'utilisation</text>
  <text class="subtitle" x="800" y="76" text-anchor="middle">Plateforme numerique de gestion et de suivi des stages</text>

  <rect class="system" x="300" y="110" width="1000" height="870"/>
  <text class="section" x="800" y="145">Systeme</text>

  <!-- Actors -->
  <g id="candidat" transform="translate(130 170)">
    <circle class="head" cx="0" cy="0" r="22"/>
    <path class="stick" d="M0 22 L0 88 M-38 48 L38 48 M0 88 L-34 136 M0 88 L34 136"/>
    <text class="actor-label" x="0" y="168">Candidat</text>
  </g>

  <g id="responsable" transform="translate(130 475)">
    <circle class="head" cx="0" cy="0" r="22"/>
    <path class="stick" d="M0 22 L0 88 M-38 48 L38 48 M0 88 L-34 136 M0 88 L34 136"/>
    <text class="actor-label" x="0" y="168">Responsable</text>
    <text class="actor-label" x="0" y="190">des stages</text>
  </g>

  <g id="admin" transform="translate(130 790)">
    <circle class="head" cx="0" cy="0" r="22"/>
    <path class="stick" d="M0 22 L0 88 M-38 48 L38 48 M0 88 L-34 136 M0 88 L34 136"/>
    <text class="actor-label" x="0" y="168">Administrateur</text>
  </g>

  <g id="encadreur" transform="translate(1470 260)">
    <circle class="head" cx="0" cy="0" r="22"/>
    <path class="stick" d="M0 22 L0 88 M-38 48 L38 48 M0 88 L-34 136 M0 88 L34 136"/>
    <text class="actor-label" x="0" y="168">Encadreur</text>
  </g>

  <g id="stagiaire" transform="translate(1470 700)">
    <circle class="head" cx="0" cy="0" r="22"/>
    <path class="stick" d="M0 22 L0 88 M-38 48 L38 48 M0 88 L-34 136 M0 88 L34 136"/>
    <text class="actor-label" x="0" y="168">Stagiaire</text>
  </g>

  <!-- Use cases: candidate -->
  <ellipse class="usecase" cx="510" cy="210" rx="150" ry="34"/>
  <text class="usecase-text" x="510" y="210">Soumettre demande</text>
  <ellipse class="usecase" cx="510" cy="285" rx="150" ry="34"/>
  <text class="usecase-text" x="510" y="285">Joindre CV</text>
  <ellipse class="usecase" cx="510" cy="360" rx="150" ry="34"/>
  <text class="usecase-text" x="510" y="360">Joindre lettre motivation</text>
  <ellipse class="usecase" cx="510" cy="435" rx="150" ry="34"/>
  <text class="usecase-text" x="510" y="435">Consulter etat demande</text>

  <!-- Use cases: responsible -->
  <ellipse class="usecase-warn" cx="790" cy="210" rx="150" ry="34"/>
  <text class="usecase-text" x="790" y="210">Traiter demandes</text>
  <ellipse class="usecase-warn" cx="790" cy="285" rx="150" ry="34"/>
  <text class="usecase-text" x="790" y="285">Accepter / refuser</text>
  <ellipse class="usecase-warn" cx="790" cy="360" rx="150" ry="34"/>
  <text class="usecase-text" x="790" y="360">Creer compte stagiaire</text>
  <ellipse class="usecase-warn" cx="790" cy="435" rx="150" ry="34"/>
  <text class="usecase-text" x="790" y="435">Affecter stage</text>
  <ellipse class="usecase-warn" cx="790" cy="510" rx="150" ry="34"/>
  <text class="usecase-text" x="790" y="510">Cloturer stage</text>

  <!-- Use cases: admin -->
  <ellipse class="usecase" cx="510" cy="610" rx="150" ry="34"/>
  <text class="usecase-text" x="510" y="610">Gerer utilisateurs</text>
  <ellipse class="usecase" cx="510" cy="685" rx="150" ry="34"/>
  <text class="usecase-text" x="510" y="685">Gerer roles</text>
  <ellipse class="usecase" cx="510" cy="760" rx="150" ry="34"/>
  <text class="usecase-text" x="510" y="760">Gerer stagiaires</text>
  <ellipse class="usecase" cx="510" cy="835" rx="150" ry="34"/>
  <text class="usecase-text" x="510" y="835">Consulter statistiques</text>
  <ellipse class="usecase" cx="510" cy="910" rx="150" ry="34"/>
  <text class="usecase-text" x="510" y="910">Archiver stages</text>

  <!-- Use cases: supervisor -->
  <ellipse class="usecase-alt" cx="1080" cy="210" rx="160" ry="34"/>
  <text class="usecase-text" x="1080" y="210">Definir objectifs</text>
  <ellipse class="usecase-alt" cx="1080" cy="285" rx="160" ry="34"/>
  <text class="usecase-text" x="1080" y="285">Creer / modifier taches</text>
  <ellipse class="usecase-alt" cx="1080" cy="360" rx="160" ry="34"/>
  <text class="usecase-text" x="1080" y="360">Suivre avancement</text>
  <ellipse class="usecase-alt" cx="1080" cy="435" rx="160" ry="34"/>
  <text class="usecase-text" x="1080" y="435">Consulter journal</text>
  <ellipse class="usecase-alt" cx="1080" cy="510" rx="160" ry="34"/>
  <text class="usecase-text" x="1080" y="510">Valider livrables</text>
  <ellipse class="usecase-alt" cx="1080" cy="585" rx="160" ry="34"/>
  <text class="usecase-text" x="1080" y="585">Evaluer le stagiaire</text>

  <!-- Use cases: intern -->
  <ellipse class="usecase-warn" cx="1080" cy="685" rx="160" ry="34"/>
  <text class="usecase-text" x="1080" y="685">Consulter taches</text>
  <ellipse class="usecase-warn" cx="1080" cy="760" rx="160" ry="34"/>
  <text class="usecase-text" x="1080" y="760">Remplir journal</text>
  <ellipse class="usecase-warn" cx="1080" cy="835" rx="160" ry="34"/>
  <text class="usecase-text" x="1080" y="835">Deposer livrables</text>
  <ellipse class="usecase-warn" cx="1080" cy="910" rx="160" ry="34"/>
  <text class="usecase-text" x="1080" y="910">Deposer rapport final</text>

  <ellipse class="usecase" cx="790" cy="835" rx="150" ry="34"/>
  <text class="usecase-text" x="790" y="835">Se connecter</text>
  <ellipse class="usecase" cx="790" cy="910" rx="150" ry="34"/>
  <text class="usecase-text" x="790" y="910">Consulter evaluations</text>

